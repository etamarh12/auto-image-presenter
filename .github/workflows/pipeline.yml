name: Python Application CI

# מתי האוטומציה רצה? בכל Push לענף main
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # איזה שרת GitHub יקצה לנו? (לינוקס מעודכן)
    runs-on: ubuntu-latest

    steps:
    # צעד 1: להוריד את הקוד שלך לתוך השרת
    - name: Checkout code
      uses: actions/checkout@v4

    # צעד 2: להתקין פייתון על השרת
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # צעד 3: להתקין את הספריות מה-requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # צעד 4: בדיקת תקינות הקוד (Syntax Check)
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics